<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persys - Dashboard</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="justify-content: center; min-height: 40px; flex-direction: column;">
                <!-- LOGO: Salve seu arquivo como 'public/images/logo.png' -->
                <img src="images/logo.png" alt="Persys" style="max-height: 70px; max-width: 100%; object-fit: contain;"
                    onerror="this.style.display='none'; document.getElementById('fallbackTitle').style.display='flex';">

                <!-- Fallback: Título em Texto (aparece se não houver logo) -->
                <div id="fallbackTitle" style="display:none; align-items:center; gap:0.5rem;">
                    <div
                        style="width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent-glow);">
                    </div>
                    Persys
                </div>

                <!-- VERSION TEXT -->
                <div style="text-align: center; margin-top: 0.5rem;">
                    <p style="margin: 0; font-size: 0.9rem; font-weight: bold; color: #1e293b;">Personaliza Brindes</p>
                    <p style="margin: 0; font-size: 0.8rem; color: #64748b;">Versão 1.0</p>
                </div>
            </div>
            <nav id="navMenu">
                <!-- Injetado via JS -->
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                <div id="userInfo" style="margin-bottom: 0.5rem; color: var(--text-secondary);"></div>
                <button id="logoutBtn" class="btn"
                    style="background: transparent; border: 1px solid var(--border); color: var(--danger); font-weight: 700;">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h2 id="pageTitle">Dashboard</h2>
                <div id="headerActions"></div>
            </div>

            <div id="contentArea">
                <!-- Conteúdo dinâmico aqui -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Modal criada dinamicamente via JS (app.js) -->

    <script src="js/app.js?v=cachebust_v17_resp_validation"></script>
    <script src="js/collaborators.js?v=delete_btn"></script>
    <script src="js/reports.js"></script>
    <script src="js/dashboard_view.js?v=metrics_fix_v2"></script>
    <script src="js/manual_view.js"></script>
</body>

</html>
