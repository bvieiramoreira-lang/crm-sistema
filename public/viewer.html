<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Layout - Persys</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: rgba(24, 24, 27, 0.85);
            --border-color: rgba(255, 255, 255, 0.15);
            --radius-full: 9999px;
            --transition-smooth: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: #ffffff;
        }

        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #viewerImage {
            max-width: 90%;
            max-height: 90%;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #18181b;
            user-select: none;
            pointer-events: auto;
        }

        #pdfFrame {
            width: 90vw;
            height: 90vh;
            border: none;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Controls overlay */
        .controls-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
            pointer-events: auto;
            align-items: center;
        }

        .btn-ctrl {
            background: none;
            border: none;
            outline: none;
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            transition: var(--transition-smooth);
            border-radius: 50%;
        }

        .btn-ctrl:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .btn-ctrl:active {
            transform: scale(0.95);
        }

        .zoom-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            min-width: 50px;
            text-align: center;
        }

        .header-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(9, 9, 11, 0.75);
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-info h1 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .header-info span {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .unsupported-msg {
            text-align: center;
            padding: 2rem;
            background: rgba(24, 24, 27, 0.8);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        .unsupported-msg p {
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .btn-download:hover {
            background: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="viewer-container" id="viewerContainer">
        <div class="header-info">
            <h1 id="fileNameLabel">Carregando...</h1>
            <span id="fileTypeLabel">Visualizador Persys</span>
        </div>

        <div id="contentArea" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        // Get query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');
        const fileType = urlParams.get('type') || 'image';

        const contentArea = document.getElementById('contentArea');
        const fileNameLabel = document.getElementById('fileNameLabel');
        const fileTypeLabel = document.getElementById('fileTypeLabel');

        if (!filePath) {
            contentArea.innerHTML = `
                <div class="unsupported-msg">
                    <p>Nenhum arquivo fornecido para visualização.</p>
                </div>
            `;
            fileNameLabel.textContent = 'Erro';
            fileTypeLabel.textContent = 'Arquivo ausente';
        } else {
            // Set file name from path
            const fileName = filePath.split('/').pop();
            fileNameLabel.textContent = decodeURIComponent(fileName);
            fileTypeLabel.textContent = fileType.toUpperCase();
            document.title = `${decodeURIComponent(fileName)} - Visualizador Persys`;

            if (fileType.startsWith('image') || fileType === 'image') {
                contentArea.innerHTML = `
                    <img id="viewerImage" src="${filePath}" draggable="false">
                    <div class="controls-overlay">
                        <button class="btn-ctrl" onclick="adjustZoom(0.25)" title="Aumentar Zoom"><i class="ph ph-plus-circle"></i></button>
                        <span class="zoom-label" id="zoomLabel">100%</span>
                        <button class="btn-ctrl" onclick="adjustZoom(-0.25)" title="Diminuir Zoom"><i class="ph ph-minus-circle"></i></button>
                        <button class="btn-ctrl" onclick="resetZoom()" title="Resetar"><i class="ph ph-arrows-counter-clockwise"></i></button>
                    </div>
                `;
                
                // Initialize Zoom & Pan Logic
                initZoomAndPan();
            } else if (fileType === 'application/pdf' || fileType === 'pdf') {
                contentArea.innerHTML = `
                    <iframe id="pdfFrame" src="${filePath}"></iframe>
                `;
            } else {
                contentArea.innerHTML = `
                    <div class="unsupported-msg">
                        <p>Tipo de arquivo não suportado para visualização direta.</p>
                        <a href="${filePath}" target="_blank" class="btn-download">
                            <i class="ph-download-simple"></i> Baixar Arquivo
                        </a>
                    </div>
                `;
            }
        }

        // --- ZOOM & PAN ENGINE ---
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        function updateTransform() {
            const img = document.getElementById('viewerImage');
            if (!img) return;
            img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            
            const label = document.getElementById('zoomLabel');
            if (label) label.textContent = `${Math.round(zoom * 100)}%`;

            const container = document.getElementById('viewerContainer');
            if (container) {
                if (isDragging) {
                    container.style.cursor = 'grabbing';
                } else if (zoom > 1) {
                    container.style.cursor = 'grab';
                } else {
                    container.style.cursor = 'zoom-in';
                }
            }
        }

        function adjustZoom(amount) {
            zoom = Math.max(0.5, Math.min(6, zoom + amount));
            if (zoom === 1) {
                panX = 0;
                panY = 0;
            }
            updateTransform();
        }

        function resetZoom() {
            zoom = 1;
            panX = 0;
            panY = 0;
            isDragging = false;
            updateTransform();
        }

        function initZoomAndPan() {
            const container = document.getElementById('viewerContainer');
            const img = document.getElementById('viewerImage');
            if (!container || !img) return;

            // 1. Wheel Zoom
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.15 : 0.15;
                adjustZoom(delta);
            }, { passive: false });

            // 2. Dragging/Panning
            const startDrag = (clientX, clientY) => {
                isDragging = true;
                startX = clientX - panX;
                startY = clientY - panY;
                updateTransform();
            };

            const moveDrag = (clientX, clientY) => {
                if (!isDragging) return;
                panX = clientX - startX;
                panY = clientY - startY;
                updateTransform();
            };

            const endDrag = () => {
                isDragging = false;
                updateTransform();
            };

            // Mouse Events
            container.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // Left click only
                if (e.target.closest('.controls-overlay')) return;
                e.preventDefault();
                startDrag(e.clientX, e.clientY);
            });

            window.addEventListener('mousemove', (e) => {
                moveDrag(e.clientX, e.clientY);
            });

            window.addEventListener('mouseup', () => {
                endDrag();
            });

            // Touch Events for Mobile
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    if (e.target.closest('.controls-overlay')) return;
                    startDrag(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            container.addEventListener('touchend', () => {
                endDrag();
            });

            // Double Click to Toggle Zoom
            let lastTap = 0;
            container.addEventListener('click', (e) => {
                if (e.target.closest('.controls-overlay')) return;
                const now = Date.now();
                if (now - lastTap < 300) {
                    if (zoom > 1) {
                        resetZoom();
                    } else {
                        zoom = 2.0;
                        updateTransform();
                    }
                }
                lastTap = now;
            });
        }
    </script>
</body>
</html>
